<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data: protonfile:; media-src 'self' data: protonfile:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self';">
<title>Proton — Learning Tracker</title>
<link rel="stylesheet" href="css/fonts.css">
<link rel="stylesheet" href="css/app.css">
<link rel="stylesheet" href="css/effects.css">
<link rel="stylesheet" href="css/notes.css">
</head>
<body>

<!-- boot loader (removed once the app is ready) -->
<div id="boot-loader"><div class="bl-atom"></div><div class="bl-text">Loading Proton…</div></div>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark">
        <!-- electron orbits (decorative, animated) -->
        <span class="atom-orbits"><svg class="atom-svg" viewBox="0 0 100 100" aria-hidden="true">
          <g class="orbit-grp o1"><ellipse class="orbit-ring" cx="50" cy="50" rx="44" ry="17"/><circle class="electron" cx="94" cy="50" r="3.4"/></g>
          <g class="orbit-grp o2" transform="rotate(60 50 50)"><ellipse class="orbit-ring" cx="50" cy="50" rx="44" ry="17"/><circle class="electron" cx="6" cy="50" r="3.4"/></g>
          <g class="orbit-grp o3" transform="rotate(120 50 50)"><ellipse class="orbit-ring" cx="50" cy="50" rx="44" ry="17"/><circle class="electron" cx="94" cy="50" r="3.4"/></g>
        </svg></span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="12" r="3"/><path d="M9 6h4a2 2 0 0 1 2 2v1m0 6v1a2 2 0 0 1-2 2H9"/></svg>
      </div>
      <div>
        <div class="brand-name" id="brand-name">Proton</div>
        <div class="brand-sub">Learning Tracker</div>
      </div>
    </div>
    <div class="nav" id="nav">
      <button class="nav-item" data-view="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        <span>Dashboard</span>
      </button>
      <button class="nav-item" data-view="paths">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a3 3 0 1 0-3-3 3 3 0 0 0 3 3M6 21a3 3 0 1 0-3-3 3 3 0 0 0 3 3M18 8v3a4 4 0 0 1-4 4h-4a4 4 0 0 0-4 4"/></svg>
        <span>Paths</span>
        <span class="nav-badge" id="nav-goal-count">0</span>
      </button>
      <button class="nav-item" data-view="board">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="5" height="16" rx="1"/><rect x="10" y="4" width="5" height="11" rx="1"/><rect x="17" y="4" width="4" height="7" rx="1"/></svg>
        <span>Board</span>
      </button>
      <button class="nav-item" data-view="notes">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h4"/></svg>
        <span>Notes</span>
      </button>
      <button class="nav-item" data-view="today">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 2 2.4 7.4H22l-6 4.6 2.3 7.4L12 17l-6.3 4.4L8 14 2 9.4h7.6z"/></svg>
        <span>Today</span>
        <span class="nav-badge" id="nav-today-count">0</span>
      </button>
    </div>
    <div class="sidebar-foot">
      <div class="streak-pill">
        <span class="streak-flame">🔥</span>
        <div>
          <div class="streak-num" id="streak-num">0</div>
          <div class="streak-lab">day streak</div>
        </div>
      </div>
      <div class="foot-btns">
        <button class="foot-btn" id="export-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 9l5-5 5 5M12 4v12"/></svg>Export</button>
        <button class="foot-btn" id="import-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>Import</button>
      </div>
      <button class="foot-btn foot-btn-wide" id="updates-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>Check for updates</button>
      <button class="foot-btn foot-btn-wide foot-btn-danger" id="reset-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>Reset everything</button>
    </div>
  </aside>
  <div class="scrim" id="scrim"></div>

  <!-- Main -->
  <main class="main">
    <header class="topbar">
      <button class="hamburger" id="hamburger"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
      <div class="page-crumb" id="crumb"></div>
      <div class="topbar-spacer"></div>
      <button class="search-trigger" id="search-trigger">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>
        <span>Search everything</span>
        <kbd>/</kbd>
      </button>
    </header>
    <div class="content" id="content"></div>
  </main>
</div>

<!-- Generic modal -->
<div class="overlay" id="modal-overlay">
  <div class="modal" id="modal"></div>
</div>

<!-- Search overlay -->
<div class="overlay" id="search-overlay">
  <div class="search-modal">
    <div class="search-input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>
      <input type="text" id="search-input" placeholder="Search paths, courses, parts, tasks, notes…" autocomplete="off">
    </div>
    <div class="search-results" id="search-results"></div>
  </div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<!-- scripts: effects → store → notes modules → app (app boots last) -->
<script src="js/effects.js"></script>
<script src="js/store.js"></script>
<script src="js/notes/editor.js"></script>
<script src="js/notes/mindmap.js"></script>
<script src="js/notes/notes.js"></script>
<script src="js/app.js"></script>
</body>
</html>
