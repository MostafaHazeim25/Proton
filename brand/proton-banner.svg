<svg width="1280" height="440" viewBox="0 0 1280 440" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Proton — Make your own universe">
  <defs>
    <radialGradient id="bg" cx="34%" cy="42%" r="85%">
      <stop offset="0%" stop-color="#0F2138"/>
      <stop offset="55%" stop-color="#0A1320"/>
      <stop offset="100%" stop-color="#070D17"/>
    </radialGradient>
    <radialGradient id="nucleus" cx="38%" cy="34%" r="70%">
      <stop offset="0%" stop-color="#FFD98A"/>
      <stop offset="45%" stop-color="#F3AC40"/>
      <stop offset="100%" stop-color="#C9781A"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F3AC40" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#F3AC40" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#F3AC40" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#CFE9E4"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1280" height="440" rx="28" fill="url(#bg)"/>

  <!-- faint constellation dots -->
  <g fill="#2DD4BF" opacity="0.5">
    <circle cx="980" cy="70" r="2.2"/><circle cx="1080" cy="120" r="1.6"/>
    <circle cx="1170" cy="60" r="2"/><circle cx="1140" cy="200" r="1.5"/>
    <circle cx="1210" cy="300" r="2.2"/><circle cx="1040" cy="360" r="1.6"/>
    <circle cx="900" cy="330" r="1.5"/><circle cx="1190" cy="390" r="1.8"/>
    <circle cx="120" cy="360" r="1.6"/><circle cx="60" cy="120" r="1.5"/>
  </g>
  <g stroke="#2DD4BF" stroke-width="1" opacity="0.16">
    <path d="M980 70 L1080 120 L1170 60"/>
    <path d="M1140 200 L1210 300 L1040 360"/>
  </g>

  <!-- ===== ATOM ===== -->
  <g transform="translate(290 220)">
    <!-- glow -->
    <circle cx="0" cy="0" r="150" fill="url(#glow)"/>

    <!-- orbits -->
    <g stroke="#2DD4BF" fill="none" stroke-width="2.4" opacity="0.85">
      <ellipse cx="0" cy="0" rx="150" ry="56"/>
      <ellipse cx="0" cy="0" rx="150" ry="56" transform="rotate(60)"/>
      <ellipse cx="0" cy="0" rx="150" ry="56" transform="rotate(120)"/>
    </g>

    <!-- electrons -->
    <g fill="#2DD4BF">
      <circle cx="150" cy="0" r="9"/>
      <circle cx="-75" cy="129.9" r="9" transform="rotate(60)"/>
      <circle cx="-75" cy="-129.9" r="9" transform="rotate(120)"/>
    </g>

    <!-- nucleus glow + core -->
    <circle cx="0" cy="0" r="58" fill="#F3AC40" opacity="0.30" filter="url(#soft)"/>
    <circle cx="0" cy="0" r="44" fill="url(#nucleus)"/>
    <!-- little node-link mark inside nucleus -->
    <g stroke="#1A1206" stroke-width="3.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="-12" cy="-12" r="6" fill="#1A1206" stroke="none"/>
      <circle cx="-12" cy="14" r="6" fill="#1A1206" stroke="none"/>
      <circle cx="14" cy="1" r="6" fill="#1A1206" stroke="none"/>
      <path d="M-6 -12 H4 a4 4 0 0 1 4 4 v2 m0 6 v2 a4 4 0 0 1 -4 4 H-6"/>
    </g>
  </g>

  <!-- ===== WORDMARK ===== -->
  <g transform="translate(545 0)">
    <text x="0" y="206" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="124" font-weight="700" fill="url(#title)" letter-spacing="-2">Proton</text>
    <!-- tagline -->
    <text x="4" y="262" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="33" font-weight="500" fill="#2DD4BF" letter-spacing="2.5">Make your own universe</text>
    <!-- subline -->
    <text x="4" y="312" font-family="'Inter', 'Segoe UI', sans-serif" font-size="20" font-weight="400" fill="#8CA0B8" letter-spacing="0.3">Offline learning tracker · paths · courses · tasks · notes</text>
    <!-- chips -->
    <g font-family="'Inter','Segoe UI',sans-serif" font-size="15" font-weight="500">
      <g transform="translate(4 348)">
        <rect width="118" height="34" rx="17" fill="#10243E" stroke="#1E3A5C"/>
        <text x="59" y="22" text-anchor="middle" fill="#CFE9E4">100% offline</text>
      </g>
      <g transform="translate(134 348)">
        <rect width="150" height="34" rx="17" fill="#10243E" stroke="#1E3A5C"/>
        <text x="75" y="22" text-anchor="middle" fill="#CFE9E4">Electron + SQLite</text>
      </g>
      <g transform="translate(296 348)">
        <rect width="132" height="34" rx="17" fill="#10243E" stroke="#1E3A5C"/>
        <text x="66" y="22" text-anchor="middle" fill="#CFE9E4">No accounts</text>
      </g>
    </g>
  </g>
</svg>
